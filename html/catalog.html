<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premium Electronics - Discover our curated collection of high-quality tech products">
    <title>Catalog - TechStore</title>
    
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    

    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/catalog.css">
    <link rel="stylesheet" href="../css/footer.css">
    
</head>
<body>
  
    
   
    <script src="../js/catalog/catalog.js"></script>
    <script src="../js/header.js"></script>
    <main class="catalog-page">
        <div class="container">
            
            <div class="page-header">
                <h1 class="page-title">Premium Electronics</h1>
                <p class="page-subtitle">Discover our curated collection of high-quality tech products</p>
            </div>

            
            <div class="catalog-info">
                <span class="products-count">6 products</span>
                <div class="sort-wrapper">
                    <label for="sort" class="sort-label">Sort by:</label>
                    <select id="sort" class="sort-select">
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="price-asc">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                    </select>
                </div>
            </div>
            
<div class="catalog-content">
    
    <aside class="filters-sidebar">
        <div class="filters-header">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="21" x2="4" y2="14"></line>
                <line x1="4" y1="10" x2="4" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12" y2="3"></line>
                <line x1="20" y1="21" x2="20" y2="16"></line>
                <line x1="20" y1="12" x2="20" y2="3"></line>
                <line x1="1" y1="14" x2="7" y2="14"></line>
                <line x1="9" y1="8" x2="15" y2="8"></line>
                <line x1="17" y1="16" x2="23" y2="16"></line>
            </svg>
            <span>Filters</span>
        </div>
        
        
        <div class="filter-section">
            <h3 class="filter-title">Rating</h3>
            <div class="filter-options">
                <label class="filter-option">
                    <input type="checkbox" name="rating" value="5">
                    <span class="checkmark"></span>
                    <span class="option-text">5+ Stars</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" name="rating" value="4">
                    <span class="checkmark"></span>
                    <span class="option-text">4+ Stars</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" name="rating" value="3">
                    <span class="checkmark"></span>
                    <span class="option-text">3+ Stars</span>
                </label>
            </div>
        </div>
        
        <
        <div class="filter-section">
            <h3 class="filter-title">Price Range</h3>
            <div class="price-slider">
                <div class="slider-track">
                    <div class="slider-range"></div>
                    <div class="slider-thumb slider-thumb-min"></div>
                    <div class="slider-thumb slider-thumb-max"></div>
                </div>
                <div class="price-values">
                    <span class="price-min">$0</span>
                    <span class="price-max">$2600</span>
                </div>
            </div>
        </div>
        
        <button class="clear-filters-btn">Clear All Filters</button>
    </aside>
    
    
    <div class="products-grid" id="products-grid">
        
    </div>
</div>
        </div>
    </main>
    <script src="../js/footer.js"></script>
</body>
</html>
