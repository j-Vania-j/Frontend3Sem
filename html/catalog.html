<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premium Electronics - Discover our curated collection of high-quality tech products">
    <title>Catalog - TechStore</title>
    
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    

    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/catalog.css">
    <link rel="stylesheet" href="../css/footer.css">
    
</head>
<body>
  
    
   
    <script src="../js/catalog/catalog.js"></script>
    <script src="../js/header.js"></script>
    <main class="catalog-page">
        <div class="container">
            
            <div class="page-header">
                <h1 class="page-title">Premium Electronics</h1>
                <p class="page-subtitle">Discover our curated collection of high-quality tech products</p>
            </div>

            
            <div class="catalog-info">
                <span class="products-count">6 products</span>
                <div class="sort-wrapper">
                    <label for="sort" class="sort-label">Sort by:</label>
                    <select id="sort" class="sort-select">
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="price-asc">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                    </select>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/footer.js"></script>
</body>
</html>
