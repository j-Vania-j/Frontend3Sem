<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portable Bluetooth Speaker - TechStore">
    <title>Portable Bluetooth Speaker - TechStore</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/card.css">
</head>

<body>

    <main class="product-page">
        <div class="container mx-auto px-4 lg:px-8 py-8">
            <div class="product-layout">
                <section class="product-gallery" aria-label="Product images">
                    <div class="gallery-main">
                        <img src="../img/speaker-1.jpg" alt="Portable Bluetooth Speaker - Main view"
                            class="gallery-main__img" id="main-image">

                        <button class="gallery-nav gallery-nav--prev" aria-label="Previous image">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <button class="gallery-nav gallery-nav--next" aria-label="Next image">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>

                    <div class="gallery-thumbs" id="thumbs-container">
                        <button class="thumb active" data-index="0">
                            <img src="../img/speaker-1.jpg" alt="Thumbnail 1">
                        </button>
                        <button class="thumb" data-index="1">
                            <img src="../img/speaker-2.jpg" alt="Thumbnail 2">
                        </button>
                        <button class="thumb" data-index="2">
                            <img src="../img/speaker-3.jpg" alt="Thumbnail 3">
                        </button>
                    </div>
                </section>

                <section class="product-info">
                    <div class="info-block info-block--top">
                        <h1 class="product-title" id="product-title"></h1>

                        <div class="product-rating">
                            <div class="stars" id="rating-stars"></div>
                            <span class="rating-score" id="rating-score"></span>
                        </div>
                        <span class="rating-reviews" id="rating-reviews"></span>

                        <div class="product-price-row">
                            <span class="price-value" id="product-price"></span>
                            <span class="shipping-text" id="shipping-text"></span>
                        </div>
                    </div>

                    <div class="info-block info-block--highlights">
                        <h3 class="highlights-title">Key Highlights</h3>
                        <ul class="highlights-list" id="highlights-list">
                        </ul>
                    </div>

                    <div class="info-block info-block--description">
                        <h3 class="description-title">Description</h3>
                        <p class="description-text" id="description-text">Loading...</p>
                    </div>

                    <div class="info-block info-block--quantity">
                        <label class="quantity-label">Quantity</label>
                        <div class="quantity-controls">
                            <button class="qty-btn qty-btn--minus" aria-label="Decrease">-</button>
                            <input type="text" class="qty-input" value="1" readonly>
                            <button class="qty-btn qty-btn--plus" aria-label="Increase">+</button>
                        </div>
                    </div>

                    <button class="btn btn--add-to-cart" id="add-to-cart-btn" data-id="">
                        <span class="btn-text">Add to Cart</span>
                        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1" />
                            <circle cx="20" cy="21" r="1" />
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                        </svg>
                    </button>

                    <div id="specs-container"></div>
                </section>
            </div>
        </div>
    </main>


    <script src="../js/header.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../js/card/card.js"></script>
</body>

</html>
