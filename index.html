<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premium Electronics - Discover our curated collection of high-quality tech products">
    <title>Catalog - TechStore</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/catalog.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>
    <script src="../js/header.js"></script>
    
    <main class="catalog-page">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Premium Electronics</h1>
                <p class="page-subtitle">Discover our curated collection of high-quality tech products</p>
            </div>

            <div class="catalog-info">
               <button class="mobile-filters-btn" id="mobileFiltersBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="16" y1="3" x2="16" y2="9"></line>
                        
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="9" x2="8" y2="15"></line>
                        
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                        <line x1="16" y1="15" x2="16" y2="21"></line>
                    </svg>
                    <span>Filters</span>
                </button>
                <span class="products-count">6 products</span>
                <div class="sort-wrapper">
                    <label for="sort" class="sort-label">Sort by:</label>
                    <select id="sort" class="sort-select">
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option> 
                        <option value="price-asc">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                    </select>
                </div>
            </div>
                        
            <div class="catalog-content">
               
                <aside class="filters-sidebar" id="filtersSidebar">
                    <div class="filters-header">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="16" y1="3" x2="16" y2="9"></line>
                            
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="9" x2="8" y2="15"></line>
                            
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                            <line x1="16" y1="15" x2="16" y2="21"></line>
                        </svg>
                        <span>Filters</span>
                        
                        <button class="filters-close-btn" id="filtersCloseBtn" aria-label="Close filters">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="filter-section">
                        <h3 class="filter-title">Rating</h3>
                        <div class="filter-options">
                            <label class="filter-option">
                                <input type="checkbox" name="rating" value="5">
                                <span class="checkmark"></span>
                                <span class="option-text">5+ Stars</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="rating" value="4">
                                <span class="checkmark"></span>
                                <span class="option-text">4+ Stars</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="rating" value="3">
                                <span class="checkmark"></span>
                                <span class="option-text">3+ Stars</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="filter-section">
                        <h3 class="filter-title">Price Range</h3>
                        <div class="slider-group">
                            <div class="slider-container">
                                <div class="slider-track"></div>
                                <div class="slider-range" id="sliderRange"></div>
                                <input type="range" min="0" max="2600" value="0" step="10" id="minPrice">
                                <input type="range" min="0" max="2600" value="2600" step="10" id="maxPrice">
                                <div class="price-labels">
                                    <span id="minValue">$0</span>
                                    <span id="maxValue">$2600</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button class="clear-filters-btn">Clear All Filters</button>
                </aside>
                
               
                <div class="products-grid" id="products-grid"></div>
            </div>
        </div>
    </main>
    
   
    <div class="filters-overlay" id="filtersOverlay"></div>
    
    
    <script src="../js/footer.js"></script>
    <script src="../js/filter/price-slider.js"></script>
    <script src="../js/filter/toggle.js"></script>
    <script src="../js/catalog/catalog.js"></script>
</body>
</html>
